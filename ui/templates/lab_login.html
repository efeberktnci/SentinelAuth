<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: black;
            font-family: Arial, sans-serif;
        }

        .box {
            width: 340px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            font-weight: 600;
        }

        p {
            margin: 0 0 18px;
            font-size: 14px;
            color: #444;
            line-height: 1.6;
        }

        a.button {
            display: inline-block;
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cfcfcf;
            border-radius: 4px;
            background: #111827;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
        }

        .switch {
            margin-top: 14px;
            font-size: 13px;
        }

        .switch a {
            color: #0000ee;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Login</h1>
        <p>Authenticate using the external identity provider flow.</p>
        <a class="button" href="{{ url_for('lab.provider_login', mode=mode) }}">Continue to Provider</a>
        <div class="switch">
            {% if mode == "vulnerable" %}
                <a href="{{ url_for('lab.lab_login', mode='secure') }}">Secure Login</a>
            {% else %}
                <a href="{{ url_for('lab.lab_login', mode='vulnerable') }}">Vulnerable Login</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
